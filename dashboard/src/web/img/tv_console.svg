  <line x1="75" y1="15" x2="75" y2="20" class="detail" stroke-width="2.5" stroke="#334155" />
  <rect x="15" y="27" width="35" height="15" class="accent" />
  <rect x="57.5" y="27" width="35" height="15" class="accent" />
