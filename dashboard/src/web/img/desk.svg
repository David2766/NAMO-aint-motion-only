  <rect x="5" y="5" width="100" height="40" rx="2" class="base" />
  <rect x="30" y="35" width="50" height="30" rx="8" class="accent" />
  <rect x="15" y="10" width="35" height="5" rx="1" fill="#334155" />
  <rect x="60" y="10" width="35" height="5" rx="1" fill="#334155" />
  <rect x="40" y="20" width="30" height="10" rx="1" class="detail" />
