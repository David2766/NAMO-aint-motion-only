<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 80" width="100%" height="100%">
  <style>
    .base { fill: #f8fafc; stroke: #334155; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
    .accent { fill: #e2e8f0; stroke: #334155; stroke-width: 1.5; stroke-linejoin: round; }
