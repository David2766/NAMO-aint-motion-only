binary_sensor:
  # PIR motion input
  - platform: gpio
    pin: GPIO1
    name: "PIR Motion Raw"
    id: pir_motion
    device_class: motion
    entity_category: diagnostic
    disabled_by_default: true
    filters:
      - delayed_off: 5s
  - platform: ld2450
    ld2450_id: ld2450_radar
    has_target:
      name: "Presence LD2450 Raw"
      id: ld2450_has_target
      disabled_by_default: true
      device_class: occupancy
      filters:
        - delayed_off: 10s
    has_moving_target:
      name: "Moving Target Raw"
      disabled_by_default: true
      device_class: motion
    has_still_target:
      name: "Still Target Raw"
      disabled_by_default: true
      device_class: occupancy

  - platform: ld2410
    ld2410_id: ld2410_radar
    has_target:
      name: "Static Radar Presence Raw"
      id: ld2410_has_target
      entity_category: diagnostic
      disabled_by_default: true
    has_moving_target:
      name: "Static Radar Moving Raw"
      id: ld2410_has_moving_target
      entity_category: diagnostic
      disabled_by_default: true
    has_still_target:
      name: "Static Radar Still Raw"
      id: ld2410_has_still_target
      entity_category: diagnostic
      disabled_by_default: true

  # Software zone presence for automation
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Factory Reset Button"
    internal: true
    filters:
      - delayed_on: 5s
    on_press:
      - logger.log: "Factory reset - WiFi credentials will be cleared on next boot"
      - button.press: restart_device
