  - platform: template
    name: "LED Blink Duration"
    id: led_blink_duration
    icon: "mdi:timer-outline"
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 300
    initial_value: 60
    step: 30
    unit_of_measurement: "s"
    mode: slider

  - platform: template
    name: "Temperature User Offset"
    id: temperature_user_offset
    icon: "mdi:thermometer-plus"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 0.0
    min_value: -2.0
    max_value: 2.0
    step: 0.1
    unit_of_measurement: "°C"
    mode: box

  - platform: template
    name: "Humidity User Offset"
    id: humidity_user_offset
    icon: "mdi:water-percent"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 0.0
    min_value: -5.0
    max_value: 5.0
    step: 0.5
    unit_of_measurement: "%"
    mode: box
