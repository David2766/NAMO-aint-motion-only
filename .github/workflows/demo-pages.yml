name: Deploy dashboard demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Validate third-party notices
        run: node scripts/generate-third-party-notices.mjs --check

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ESPHome
        run: python -m pip install esphome==2026.5.1

      - name: Validate ESPHome configuration
        run: python -m esphome config presence-sensor-xiao-s3.yaml

      - name: Install dependencies
        run: npm ci
        working-directory: dashboard

      - name: Run tests
        run: npm test
        working-directory: dashboard

      - name: Type check
        run: npm run typecheck
        working-directory: dashboard

      - name: Lint
        run: npm run lint
        working-directory: dashboard

      - name: Build demo
        run: npm run build:demo
        working-directory: dashboard

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist-demo

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
